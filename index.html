<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>PEPTQ Institutional Research Portal</title>
    <meta name="description" content="PEPTQ Institutional Research Portal for secure B2B operations, procurement workflows, and print-safe institutional labeling." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://peptq-print-beta.vercel.app/" />
    <meta property="og:title" content="PEPTQ Institutional Research Portal" />
    <meta property="og:description" content="Secure institutional research operations and print-safe label workflows." />
    <meta property="og:site_name" content="PEPTQ Institutional Research" />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get('spa') !== '1') return;

          var path = params.get('path') || '/';
          var search = params.get('search') ? decodeURIComponent(params.get('search')) : '';
          var hash = params.get('hash') ? decodeURIComponent(params.get('hash')) : '';

          // Compute GitHub Pages project base (first path segment).
          var segments = window.location.pathname.split('/').filter(Boolean);
          var base = segments.length ? '/' + segments[0] + '/' : '/';

          var normalizedPath = String(path || '/').replace(/^\/+/, '');
          var next = base + normalizedPath;

          if (search && search !== '?') next += search;
          if (hash && hash !== '#') next += hash;

          window.history.replaceState(null, '', next);
        } catch (e) {
          // If anything goes wrong, leave the URL as-is.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
